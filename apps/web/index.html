<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Explore and generate reproducible OKLCH color palettes." />
    <title>Quick Palette</title>
    <script>
      (() => {
        let saved = "system";
        try {
          saved = localStorage.getItem("quick-palette-theme") || "system";
        } catch {
          // The system preference remains available when storage is blocked.
        }
        const dark = saved === "dark" || (saved === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
        document.documentElement.style.colorScheme = dark ? "dark" : "light";
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
